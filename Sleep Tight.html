  #tweaks-panel .tweak-toggle { width: 36px; height: 20px; background: #2C3E5A; border-radius: 10px; cursor: pointer; position: relative; border: none; }

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth < 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return mobile;
}

const COLORS = {
  navy: '#1A2744',
  gold: '#D4A843',
  cream: '#FDF6EC',
  lightNavy: '#2C3E5A',
};

// Lucide icon renderer
function LucideIcon({ name, size = 20, color = 'currentColor', strokeWidth = 2 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const icon = window.lucide[name];
      if (icon) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', color);
        svg.setAttribute('stroke-width', strokeWidth);
        svg.setAttribute('stroke-linecap', 'round');
        svg.setAttribute('stroke-linejoin', 'round');
        icon[2].forEach(([tag, attrs]) => {
          const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
          Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
          svg.appendChild(el);
        });
        ref.current.appendChild(svg);
      }
    }
  }, [name, size, color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center'}} />;
}

const features = [
  { icon: 'Moon', title: 'Sleep Cycle Science', desc: 'Why wake time matters more than bedtime' },
  { icon: 'Bed', title: 'Sleep Sanctuary Audit', desc: 'The bedroom fixes that actually matter' },
  { icon: 'Wind', title: 'Wind-Down Rituals', desc: 'Build a 30-minute routine that sticks' },
  { icon: 'Activity', title: 'Breathing Techniques', desc: 'The 4-2-6 pattern therapists teach' },
  { icon: 'Utensils', title: 'Food & Caffeine Timing', desc: 'What to eat, what to avoid' },
  { icon: 'Brain', title: 'CBT-I Thought Reframing', desc: 'Quiet the 2am anxiety loop' },
  { icon: 'BookOpen', title: '7 Sleep Myths Busted', desc: 'What the internet gets wrong' },
  { icon: 'LineChart', title: 'Sleep Journal Framework', desc: 'Track what works for YOUR body' },
];

function StarRating({ show }) {
  if (!show) return null;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom: 12 }}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width="18" height="18" viewBox="0 0 24 24" fill="#D4A843" stroke="none">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      ))}
      <span style={{ fontFamily:'Nunito', fontSize:13, color:'#7a8a9a', marginLeft:4 }}>4.9 · 2,400+ readers</span>
    </div>
  );
}

function EmailForm({ btnStyle, onSuccess, dark = false, formId, thankYouId }) {
  const [email, setEmail] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const isMobile = useIsMobile();

  const validate = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!validate(email)) { setError('Please enter a valid email address.'); return; }
    setError('');
    setLoading(true);
    setTimeout(() => { setLoading(false); setDone(true); if (onSuccess) onSuccess(); }, 1400);
  };

  const btnRadius = btnStyle === 'pill' ? 50 : 10;
  const btnBg = btnStyle === 'outline' ? 'transparent' : COLORS.gold;
  const btnColor = btnStyle === 'outline' ? COLORS.gold : COLORS.navy;
  const btnBorder = btnStyle === 'outline' ? `2px solid ${COLORS.gold}` : 'none';

  if (done) return (
    <div style={{ padding:'22px 28px', background: dark ? 'rgba(255,255,255,0.08)' : '#e8f5e9', borderRadius:14, textAlign:'center' }}>
      <div style={{ fontSize:32, marginBottom:8 }}>🎉</div>
      <div style={{ fontFamily:'Quicksand', fontWeight:700, fontSize:18, color: dark ? '#fff' : '#1A2744', marginBottom:4 }}>Check your inbox!</div>
      <div style={{ fontFamily:'Nunito', fontSize:14, color: dark ? '#8a9ab5' : '#4a5568' }}>Your free copy of Sleep Tight is on its way.</div>
    </div>
  );

  return (
    <>
    <form id={formId} noValidate>
      <input type="hidden" name="ml-submit" value="1" />
      <input type="hidden" name="anticsrf" value="true" />
      <div style={{
        display:'flex',
        flexDirection: isMobile ? 'column' : 'row',
        gap:10,
        marginBottom: error ? 6 : 12,
      }}>
        <input
          type="email"
          name="fields[email]"
          placeholder="Your email address"
          value={email}
          onChange={e => { setEmail(e.target.value); setError(''); }}
          style={{
            flex: '1 1 auto',
            width: isMobile ? '100%' : 'auto',
            padding: '14px 18px',
            borderRadius: btnStyle === 'pill' ? 50 : 10,
            border: error ? '2px solid #e53e3e' : '2px solid #d0dae8',
            fontFamily: 'Nunito',
            fontSize: 15,
            color: COLORS.navy,
            background: '#fff',
            outline: 'none',
            transition: 'border-color 0.2s',
          }}
          onFocus={e => { if (!error) e.target.style.borderColor = COLORS.gold; }}
          onBlur={e => { if (!error) e.target.style.borderColor = '#d0dae8'; }}
        />
        <button
          type="submit"
          disabled={loading}
          style={{
            flex: '0 0 auto',
            width: isMobile ? '100%' : 'auto',
            padding: '14px 26px',
            borderRadius: btnRadius,
            background: btnBg,
            color: btnColor,
            border: btnBorder,
            fontFamily: 'Quicksand',
            fontWeight: 700,
            fontSize: 15,
            cursor: loading ? 'default' : 'pointer',
            transition: 'all 0.2s',
            opacity: loading ? 0.7 : 1,
            whiteSpace: 'nowrap',
            letterSpacing: '0.02em',
          }}
          onMouseEnter={e => { if (!loading) { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(212,168,67,0.4)'; }}}
          onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}
        >
          {loading ? 'Sending…' : 'Get My Free Copy →'}
        </button>
      </div>
      {error && <div style={{ color:'#e53e3e', fontSize:13, fontFamily:'Nunito', marginBottom:10 }}>{error}</div>}
      <p style={{ fontFamily:'Nunito', fontSize:13, color: dark ? '#6a7a8a' : '#7a8a9a', letterSpacing:'0.01em', textAlign: isMobile ? 'center' : 'left' }}>
        Instant download. No spam. Unsubscribe anytime.
      </p>
    </form>
    <div id={thankYouId} style={{display:'none', padding:'16px'}}>
      <p><strong>Check your email!</strong> Your guide is on its way.</p>
    </div>
    </>
  );
}

function FeatureCard({ icon, title, desc, cardStyle }) {
  const [hovered, setHovered] = useState(false);
  let bg = '#fff', border = '1.5px solid #e2e8f0', color = COLORS.navy;
  if (cardStyle === 'filled') { bg = COLORS.cream; border = '1.5px solid #e8dfc8'; }
  if (cardStyle === 'dark') { bg = COLORS.lightNavy; border = 'none'; color = '#FDF6EC'; }

  return (
    <div

<script>
function wireMailerLiteForm(formId, thankYouId) {
  const form = document.getElementById(formId);
  const thankYou = document.getElementById(thankYouId);
  if (!form || !thankYou) return;
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const button = form.querySelector('button');
    const originalText = button ? button.textContent : null;
    if (button) { button.textContent = 'Sending...'; button.disabled = true; }
    const urlParams = new URLSearchParams(window.location.search);
    const params = new URLSearchParams();

    // Copy form fields (email + hidden inputs)
    const fd = new FormData(form);
    for (const [key, value] of fd) {
      params.append(key, value);
    }

    // Append UTMs if present in URL
    ['utm_source','utm_medium','utm_campaign','utm_content','utm_placement'].forEach(k => {
      const v = urlParams.get(k);
      if (v) params.append(`fields[${k}]`, v);
    });

    try {
      const response = await fetch('https://assets.mailerlite.com/jsonp/2269010/forms/185326300296119357/subscribe', {
        method: 'POST',
        body: params
      });
      const data = await response.json();
      if (data.success) {
        form.style.display = 'none';
        thankYou.style.display = 'block';
        // Track conversion in Vercel Analytics if enabled
        if (window.va) {
          window.va('event', {
            name: 'Email Signup',
            data: {
              form: formId,
              utm_source: urlParams.get('utm_source') || 'direct',
              utm_content: urlParams.get('utm_content') || 'none'
            }
          });
        }
        if (window.trackEvent) window.trackEvent('form_submit_success', { form: formId });
      } else {
        throw new Error(data.message || 'Subscription failed');
      }
    } catch (err) {
      if (button) {
        button.textContent = originalText;
        button.disabled = false;
      }
      if (window.trackEvent) window.trackEvent('form_submit_error', { form: formId, reason: err.message });
      alert('Something went wrong. Please try again.');
    }
  });
}
(function wireWhenReady() {
  if (document.getElementById('signupFormHero') && document.getElementById('signupFormBottom')) {
    wireMailerLiteForm('signupFormHero', 'thankYouHero');
    wireMailerLiteForm('signupFormBottom', 'thankYouBottom');
  } else {
    setTimeout(wireWhenReady, 50);
  }
})();
</script>
<script>
// Self-hosted analytics — posts to /api/track. Fails silently.
(function () {
  function getOrCreateVisitorId() {
    var KEY = 'st_vid';
    try {
      var id = localStorage.getItem(KEY);
      if (!id) {
        if (window.crypto && crypto.randomUUID) {
          id = crypto.randomUUID().replace(/-/g, '').slice(0, 16);
        } else {
          id = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 10);
        }
        localStorage.setItem(KEY, id);
      }
      return id;
    } catch (e) {
      return 'anon_' + Math.random().toString(36).slice(2, 10);
    }
  }

  var VISITOR_ID = getOrCreateVisitorId();
  var SESSION_ID = 'sess_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

  var urlParams = new URLSearchParams(window.location.search);
  var baseData = {
    visitor_id: VISITOR_ID,
    session_id: SESSION_ID,
    path: window.location.pathname,
    referrer: document.referrer || '',
    utm_source: urlParams.get('utm_source') || '',
    utm_medium: urlParams.get('utm_medium') || '',
    utm_campaign: urlParams.get('utm_campaign') || '',
    utm_content: urlParams.get('utm_content') || '',
    utm_placement: urlParams.get('utm_placement') || '',
  };

  // Batched dispatch — bursts of scroll/focus events would previously get
  // throttled at Vercel's edge (503 before the function runs). Queue up to
  // 10 events or 2s, then flush in one request. sendBeacon on page hide
  // guarantees the tail gets delivered during unload.
  var ENDPOINT = '/api/track';
  var eventQueue = [];
  var FLUSH_INTERVAL_MS = 2000;
  var FLUSH_THRESHOLD = 10;
  var flushTimer = null;

  function scheduleFlush() {
    if (flushTimer) return;
    flushTimer = setTimeout(function () { flushTimer = null; flush(); }, FLUSH_INTERVAL_MS);
  }

  // Retry once after 1s on network error OR non-2xx. The FIRST request to a
  // cold Vercel function sometimes returns 503 at the edge before the handler
  // runs (container / Redis still warming). After ~1s the container is warm
  // and the retry succeeds. One retry only — don't hammer a broken endpoint.
  function sendBatch(body, attempt) {
    try {
      return fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body,
        keepalive: true,
      }).then(function (r) {
        if (!r.ok && attempt === 0) {
          return new Promise(function (resolve) {
            setTimeout(function () { resolve(sendBatch(body, 1)); }, 1000);
          });
        }
        return r;
      }).catch(function () {
        if (attempt === 0) {
          return new Promise(function (resolve) {
            setTimeout(function () { resolve(sendBatch(body, 1)); }, 1000);
          });
        }
      });
    } catch (_) {}
  }

  function flush(useBeacon) {
    if (eventQueue.length === 0) return;
    var batch = eventQueue.splice(0, eventQueue.length);
    var body = JSON.stringify({ events: batch });

    if (useBeacon && navigator.sendBeacon) {
      try {
        var blob = new Blob([body], { type: 'application/json' });
        navigator.sendBeacon(ENDPOINT, blob);
        return;
      } catch (_) { /* fall through to fetch */ }
    }

    sendBatch(body, 0);
  }

  function track(event, metadata) {
    eventQueue.push(Object.assign({}, baseData, {
      event: event,
      metadata: metadata || {},
      t: Date.now(),
    }));
    if (eventQueue.length >= FLUSH_THRESHOLD) {
      if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
      flush();
    } else {
      scheduleFlush();
    }
  }

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden') flush(true);
  });
  window.addEventListener('pagehide', function () { flush(true); });

  window.trackEvent = track;

  track('pageview');

  var thresholds = [25, 50, 75, 100];
  var fired = new Set();
  function onScroll() {
    var doc = document.documentElement;
    var scrollTop = window.scrollY || doc.scrollTop || 0;
    var viewport = window.innerHeight || doc.clientHeight || 0;
    var full = doc.scrollHeight || document.body.scrollHeight || 1;
    var pct = Math.min(100, Math.round(((scrollTop + viewport) / full) * 100));
    thresholds.forEach(function (t) {
      if (pct >= t && !fired.has(t)) {
        fired.add(t);
        track('scroll_depth', { depth: t });
      }
    });
  }
  window.addEventListener('scroll', onScroll, { passive: true });

  document.addEventListener('click', function (e) {
    var btn = e.target.closest && e.target.closest('button[type="submit"]');
    if (!btn) return;
    var form = btn.closest('form');
    var loc = (form && form.id) || 'unknown';
    track('cta_click', { cta_location: loc });
  });

  // Form focus — delegate via focusin (bubbles; survives dynamic mounts).
  // The email inputs are rendered by React after this IIFE runs, so a direct
  // querySelectorAll at load time matches nothing.
  var focusedForms = new Set();
  document.addEventListener('focusin', function (e) {
    var el = e.target;
    if (!el || el.tagName !== 'INPUT' || el.type !== 'email') return;
    var form = el.closest && el.closest('form');
    var formId = (form && form.id) || 'unknown';
    if (focusedForms.has(formId)) return;
    focusedForms.add(formId);
    track('form_focus', { form: formId });
  });

  var exitFired = false;
  var loadedAt = Date.now();
  function fireExit(reason) {
    if (exitFired) return;
    exitFired = true;
    track('exit_intent', { reason: reason });
  }
  document.addEventListener('mouseleave', function (e) {
    if (e.clientY <= 0) fireExit('mouseleave_top');
  });
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden' && Date.now() - loadedAt > 3000) {
      fireExit('visibility_hidden');
    }
  });
  window.addEventListener('pagehide', function () { fireExit('pagehide'); });
})();
</script>
